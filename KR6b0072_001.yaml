body:
  text: 西晉沙門法炬譯聞如是一時婆伽婆在舍衛城祇樹給孤獨園爾時世尊告諸比丘譬如群牛志性調良所至到處擇軟草食飲清涼水時有一驢便作是念此諸群牛志性調良所至到處擇軟草食飲清涼水我今亦可效彼擇軟草食飲清涼水時彼驢入群牛中前腳跑土觸嬈彼群牛亦效群牛鳴吼然不能改其聲我亦是牛我亦是牛然彼群牛以角抵殺而捨之去此亦如是若有一比丘不精進修惡法非沙門言是沙門不修梵行言修梵行亦不多聞邪見威儀不具足行步來往屈申俯仰不解著衣持鉢不能延得衣被食飲床臥具病瘦醫藥彼若見比丘精進修善法於沙門中成沙門行修梵行多聞博學而修善法威儀悉善行步來往屈申俯仰著衣持鉢不失禮節得衣被飲食床臥具病瘦醫藥時惡行比丘便作是念此衆多比丘精進修善法於沙門成沙門行於梵行成梵行威儀具足行步來往屈申俯仰著衣持鉢皆悉備具是得衣被飲食床臥具病瘦醫藥皆已備具我今可入彼衆中我亦當得衣被飲食床臥具病瘦醫藥時惡比丘修惡法無沙門行言是沙門無梵行言修梵行少聞有諸惡見便入彼衆多精進比丘所欲效彼威儀禮節行步來往屈申俯仰著衣持鉢如彼微妙比丘精進修善法行步來往屈申俯仰著衣持鉢便作是言我是沙門我是沙門時微妙比丘皆悉證知此比丘不精進言精進非沙門言是沙門不修梵行言修梵行不多聞有諸邪見時諸微妙比丘便擯出界外汝速出去莫住我衆譬如彼群牛志性調良驅出彼驢是故諸比丘非沙門行非婆羅門行當捨離之諸沙門善行及婆羅門善行當善諷誦持如是諸比丘當作是學爾時諸比丘聞佛所説歡喜奉行
